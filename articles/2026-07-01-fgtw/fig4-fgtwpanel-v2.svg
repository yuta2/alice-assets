<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="IBM Plex Sans, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bar100" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <linearGradient id="bar96" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <linearGradient id="bar97" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
    <linearGradient id="bar25" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="40" y="36" font-size="15" font-weight="700" fill="#ecf0f1" font-family="IBM Plex Sans, -apple-system, sans-serif">Figure 4: F-G-T-W Quality Panel — Multi-Dimension Score Distribution (2026-07-01)</text>

  <!-- Subtitle -->
  <text x="40" y="58" font-size="11" fill="#7f8c8d" font-family="IBM Plex Sans, -apple-system, sans-serif">Five quality dimensions scored by independent Graders. Memory is the sole red zone (25/100), driven by file-size overrun warnings in MEMORY.md (4822B) and USER.md (3611B) exceeding the 3500B threshold.</text>

  <!-- Chart area -->
  <g transform="translate(80, 80)">
    <!-- Y axis grid lines -->
    <line x1="0" y1="0" x2="0" y2="300" stroke="#2c3e50" stroke-width="1"/>
    <line x1="0" y1="300" x2="580" y2="300" stroke="#2c3e50" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="0" y1="240" x2="580" y2="240" stroke="#2c3e50" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="180" x2="580" y2="180" stroke="#2c3e50" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="120" x2="580" y2="120" stroke="#2c3e50" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="0" y1="60" x2="580" y2="60" stroke="#2c3e50" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Y axis labels -->
    <text x="-10" y="304" text-anchor="end" font-size="10" fill="#7f8c8d">0</text>
    <text x="-10" y="244" text-anchor="end" font-size="10" fill="#7f8c8d">20</text>
    <text x="-10" y="184" text-anchor="end" font-size="10" fill="#7f8c8d">40</text>
    <text x="-10" y="124" text-anchor="end" font-size="10" fill="#7f8c8d">60</text>
    <text x="-10" y="64" text-anchor="end" font-size="10" fill="#7f8c8d">80</text>
    <text x="-10" y="4" text-anchor="end" font-size="10" fill="#7f8c8d">100</text>

    <!-- Y axis label -->
    <text x="-55" y="150" text-anchor="middle" font-size="10" fill="#7f8c8d" transform="rotate(-90, -55, 150)">Score</text>

    <!-- Bars: 5 groups, 6 bars per group, bar width=14, group width=100 -->
    <!-- Group 1: Documents (100) -->
    <rect x="18" y="0" width="14" height="300" fill="url(#bar100)" rx="2"/>
    <text x="25" y="336" text-anchor="middle" font-size="10" fill="#2ecc71" font-weight="600">100</text>
    <text x="25" y="358" text-anchor="middle" font-size="10" fill="#bdc3c7">文件</text>

    <!-- Group 2: Skills (100) -->
    <rect x="118" y="0" width="14" height="300" fill="url(#bar100)" rx="2"/>
    <text x="125" y="336" text-anchor="middle" font-size="10" fill="#2ecc71" font-weight="600">100</text>
    <text x="125" y="358" text-anchor="middle" font-size="10" fill="#bdc3c7">技能</text>

    <!-- Group 3: Stories (96) — 96% of 300 = 288 -->
    <rect x="218" y="12" width="14" height="288" fill="url(#bar96)" rx="2"/>
    <text x="225" y="336" text-anchor="middle" font-size="10" fill="#3498db" font-weight="600">96</text>
    <text x="225" y="358" text-anchor="middle" font-size="10" fill="#bdc3c7">故事</text>

    <!-- Group 4: Visual (97) — 97% of 300 = 291 -->
    <rect x="318" y="9" width="14" height="291" fill="url(#bar97)" rx="2"/>
    <text x="325" y="336" text-anchor="middle" font-size="10" fill="#9b59b6" font-weight="600">97</text>
    <text x="325" y="358" text-anchor="middle" font-size="10" fill="#bdc3c7">視覺</text>

    <!-- Group 5: Memory (25) — 25% of 300 = 75 -->
    <rect x="418" y="225" width="14" height="75" fill="url(#bar25)" rx="2"/>
    <text x="425" y="336" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">25</text>
    <text x="425" y="358" text-anchor="middle" font-size="10" fill="#bdc3c7">記憶</text>

    <!-- P-count annotations -->
    <text x="25" y="382" text-anchor="middle" font-size="9" fill="#7f8c8d">P0=0 P1=0 P2=0</text>
    <text x="125" y="382" text-anchor="middle" font-size="9" fill="#7f8c8d">P0=0 P1=0 P2=0</text>
    <text x="225" y="382" text-anchor="middle" font-size="9" fill="#7f8c8d">P0=0 P2=2</text>
    <text x="325" y="382" text-anchor="middle" font-size="9" fill="#7f8c8d">P0=0 P2=1</text>
    <text x="425" y="382" text-anchor="middle" font-size="9" fill="#e74c3c">P1=5 ⚠</text>

    <!-- X axis top labels (domain) -->
    <text x="25" y="-12" text-anchor="middle" font-size="10" fill="#2ecc71" font-weight="600">✅</text>
    <text x="125" y="-12" text-anchor="middle" font-size="10" fill="#2ecc71" font-weight="600">✅</text>
    <text x="225" y="-12" text-anchor="middle" font-size="10" fill="#3498db" font-weight="600">✅</text>
    <text x="325" y="-12" text-anchor="middle" font-size="10" fill="#9b59b6" font-weight="600">✅</text>
    <text x="425" y="-12" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">🔴</text>
  </g>

  <!-- Bottom annotations -->
  <g transform="translate(40, 470)">
    <!-- Gate trend -->
    <text x="0" y="0" font-size="9" fill="#7f8c8d">Gate trend (last 5):</text>
    <text x="140" y="0" font-size="9" fill="#2ecc71">5/5 STABLE or IMPROVEMENT (alice-speak: 75→100 / stock-six-point: 95→100 / thinking-sop: 90→100 / kb-watcher: 90→100 / skill-audit: 90→100)</text>

    <text x="0" y="18" font-size="9" fill="#7f8c8d">Memory root cause: MEMORY.md 4822B > 3500B threshold + USER.md 3611B > 3500B threshold — P1×5 are capacity &amp; deduplication debt, not logic errors.</text>
  </g>

  <!-- Source -->
  <text x="40" y="504" font-size="8" fill="#555">Source: fgtw-panel.js execution on 2026-07-01. Gate scores from skill-gate.js validate log.</text>
</svg>
